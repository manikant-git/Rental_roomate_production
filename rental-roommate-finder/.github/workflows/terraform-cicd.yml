# =============================================================
# TERRAFORM CI/CD PIPELINE
# Real org standard:
#   PR to main  -> terraform plan (show what will change, comment on PR)
#   Merge to main -> terraform apply (actually create/update infra)
# =============================================================

name: Terraform Infrastructure CI/CD

on:
  pull_request:
    branches: [main]
    paths:
      - 'rental-roommate-finder/terraform/**'
  push:
    branches: [main]
    paths:
      - 'rental-roommate-finder/terraform/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write  # to comment plan output on PR

env:
  TF_VERSION: "1.5.7"
  TF_WORKING_DIR: rental-roommate-finder/terraform

jobs:
  # ============================================================
  # JOB 1: terraform plan (runs on every PR)
  # Shows DevOps team WHAT will change before applying
  # ============================================================
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        environment: [staging, production]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var-file=environments/${{ matrix.environment }}.tfvars \
            -var="db_password=${{ secrets.TF_DB_PASSWORD }}" \
            -no-color \
            -out=tfplan-${{ matrix.environment }}
        continue-on-error: true  # don't fail, we want to comment the plan

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `### Terraform Plan - ${{ matrix.environment }}
            \`\`\`\n${{ steps.plan.outputs.stdout }}\n\`\`\`
            *Planned by: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # ============================================================
  # JOB 2: terraform apply (runs ONLY when merged to main)
  # Staging applies first, production requires manual approval
  # ============================================================
  terraform-apply-staging:
    name: "Terraform Apply - Staging"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply - Staging
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply \
            -var-file=environments/staging.tfvars \
            -var="db_password=${{ secrets.TF_DB_PASSWORD }}" \
            -auto-approve

      - name: Output Role ARNs for GitHub Secrets
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "Staging Role ARN:"
          terraform output -raw github_staging_role_arn
          echo "Add this to GitHub Secrets as AWS_STAGING_ROLE_ARN"

  terraform-apply-production:
    name: "Terraform Apply - Production"
    runs-on: ubuntu-latest
    needs: terraform-apply-staging  # staging must succeed first
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production  # requires manual approval in GitHub
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply - Production
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply \
            -var-file=environments/prod.tfvars \
            -var="db_password=${{ secrets.TF_DB_PASSWORD }}" \
            -auto-approve

      - name: Output Role ARNs for GitHub Secrets
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "Production Role ARN:"
          terraform output -raw github_production_role_arn
          echo "Add this to GitHub Secrets as AWS_PROD_ROLE_ARN"

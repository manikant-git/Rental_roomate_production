# =============================================================
# TERRAFORM CI/CD PIPELINE - ORG STANDARD
# Real org standard:
#   PR to main  -> terraform plan per environment (comment on PR)
#   Merge to main -> terraform apply (dev first, then staging, then prod)
# KEY FIXES:
#   - Separate IAM role per environment (blast radius isolation)
#   - Separate state key per environment (state isolation)
#   - dev -> staging -> prod promotion chain
# =============================================================
name: Terraform Infrastructure CI/CD

on:
  pull_request:
    branches: [main]
    paths:
      - 'rental-roommate-finder/terraform/**'
  push:
    branches: [main]
    paths:
      - 'rental-roommate-finder/terraform/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.5.7"
  TF_WORKING_DIR: rental-roommate-finder/terraform
  AWS_REGION: us-east-1
  STATE_BUCKET: rentmate-terraform-state-prod
  LOCK_TABLE: rentmate-terraform-locks

jobs:
  # ============================================================
  # JOB 1: Terraform Plan - runs on every PR
  # Plans all 3 environments and comments output on PR
  # Each environment uses its OWN role and OWN state key
  # ============================================================
  terraform-plan:
    name: "Terraform Plan - ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        include:
          - environment: dev
            role_secret: AWS_DEV_ROLE_ARN
            state_key: rentmate/dev/terraform.tfstate
          - environment: staging
            role_secret: AWS_STAGING_ROLE_ARN
            state_key: rentmate/staging/terraform.tfstate
          - environment: production
            role_secret: AWS_PROD_ROLE_ARN
            state_key: rentmate/prod/terraform.tfstate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials - ${{ matrix.environment }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[matrix.role_secret] }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init - ${{ matrix.environment }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=${{ matrix.state_key }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.LOCK_TABLE }}" \
            -backend-config="encrypt=true" \
            -reconfigure

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan - ${{ matrix.environment }}
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var-file=environments/${{ matrix.environment }}.tfvars \
            -var="db_password=${{ secrets.TF_DB_PASSWORD }}" \
            -no-color \
            -out=tfplan-${{ matrix.environment }}
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `### Terraform Plan - ${{ matrix.environment }}
            \`\`\`\n${{ steps.plan.outputs.stdout }}\n\`\`\`
            *Planned by: @${{ github.actor }} | Role: ${{ matrix.role_secret }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # ============================================================
  # JOB 2: Apply Dev (runs on merge to main - auto apply)
  # Dev is lowest risk - no approval needed
  # Uses SEPARATE dev IAM role and SEPARATE dev state key
  # ============================================================
  terraform-apply-dev:
    name: "Terraform Apply - Dev"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials - Dev
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEV_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init - Dev
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=rentmate/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.LOCK_TABLE }}" \
            -backend-config="encrypt=true" \
            -reconfigure

      - name: Terraform Apply - Dev
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply \
            -var-file=environments/dev.tfvars \
            -var="db_password=${{ secrets.TF_DB_PASSWORD }}" \
            -auto-approve

  # ============================================================
  # JOB 3: Apply Staging (needs dev to succeed first)
  # Uses SEPARATE staging IAM role and SEPARATE staging state key
  # ============================================================
  terraform-apply-staging:
    name: "Terraform Apply - Staging"
    runs-on: ubuntu-latest
    needs: terraform-apply-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials - Staging
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init - Staging
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=rentmate/staging/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.LOCK_TABLE }}" \
            -backend-config="encrypt=true" \
            -reconfigure

      - name: Terraform Apply - Staging
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply \
            -var-file=environments/staging.tfvars \
            -var="db_password=${{ secrets.TF_DB_PASSWORD }}" \
            -auto-approve

  # ============================================================
  # JOB 4: Apply Production (needs staging to succeed + manual approval)
  # Uses SEPARATE prod IAM role and SEPARATE prod state key
  # GitHub Environment protection = required reviewers before applying
  # ============================================================
  terraform-apply-production:
    name: "Terraform Apply - Production"
    runs-on: ubuntu-latest
    needs: terraform-apply-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials - Production
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init - Production
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=rentmate/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.LOCK_TABLE }}" \
            -backend-config="encrypt=true" \
            -reconfigure

      - name: Terraform Apply - Production
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply \
            -var-file=environments/prod.tfvars \
            -var="db_password=${{ secrets.TF_DB_PASSWORD }}" \
            -auto-approve

# ================================================================
# CI/CD PIPELINE - RentMate Production
# Architect-grade pipeline with OIDC auth, security scanning,
# environment promotion, and automated rollback
# ================================================================

name: RentMate Production CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # Required for OIDC auth with AWS
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: rental-prod-cluster

jobs:
  # ─── Job 1: Code Quality & Testing ───────────────────────────
  test:
    name: "Test: ${{ matrix.service }}"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, listing-service, roommate-service, notification-service, api-gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rental-roommate-finder/backend/${{ matrix.service }}/package-lock.json
      - name: Install dependencies
        working-directory: rental-roommate-finder/backend/${{ matrix.service }}
        run: npm ci
      - name: Lint
        working-directory: rental-roommate-finder/backend/${{ matrix.service }}
        run: npm run lint --if-present
      - name: Unit Tests
        working-directory: rental-roommate-finder/backend/${{ matrix.service }}
        run: npm test --if-present
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test

  # ─── Job 2: Build & Push Docker Images ───────────────────────
  build:
    name: "Build: ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    strategy:
      matrix:
        service: [auth-service, listing-service, roommate-service, notification-service, api-gateway, frontend]
        include:
          - service: auth-service
            context: rental-roommate-finder/backend/auth-service
          - service: listing-service
            context: rental-roommate-finder/backend/listing-service
          - service: roommate-service
            context: rental-roommate-finder/backend/roommate-service
          - service: notification-service
            context: rental-roommate-finder/backend/notification-service
          - service: api-gateway
            context: rental-roommate-finder/backend/api-gateway
          - service: frontend
            context: rental-roommate-finder/frontend
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─── Job 3: Security Scanning ────────────────────────────────
  security:
    name: "Security Scan: ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    strategy:
      matrix:
        service: [auth-service, listing-service, api-gateway, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'  # Fail pipeline on CRITICAL vulnerabilities
      - name: Upload to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

  # ─── Job 4: Deploy to Staging (develop branch) ───────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.rentmate.yourdomain.com
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }}-staging --region ${{ env.AWS_REGION }}
      - name: Rolling Deploy to Staging
        run: |
          SHA=${{ github.sha }}
          for svc in auth-service listing-service roommate-service notification-service api-gateway frontend; do
            kubectl set image deployment/$svc \
              $svc=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/$svc:sha-$SHA \
              -n rental-app
            kubectl rollout status deployment/$svc -n rental-app --timeout=120s
          done
      - name: Smoke Tests
        run: |
          sleep 15
          curl -sf https://staging.rentmate.yourdomain.com/api/auth/health
          curl -sf https://staging.rentmate.yourdomain.com/api/listing/health
          echo "Staging smoke tests passed"

  # ─── Job 5: Deploy to Production (main branch) ───────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://rentmate.yourdomain.com
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
      - name: Deploy to Production with automatic rollback
        run: |
          SHA=${{ github.sha }}
          FAILED_SERVICES=()
          for svc in auth-service listing-service roommate-service notification-service api-gateway frontend; do
            kubectl set image deployment/$svc \
              $svc=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/$svc:sha-$SHA \
              -n rental-app
            if ! kubectl rollout status deployment/$svc -n rental-app --timeout=180s; then
              echo "FAILED: $svc rollout failed - rolling back"
              FAILED_SERVICES+=("$svc")
              kubectl rollout undo deployment/$svc -n rental-app
            fi
          done
          if [ ${#FAILED_SERVICES[@]} -ne 0 ]; then
            echo "The following services failed: ${FAILED_SERVICES[*]}"
            exit 1
          fi
      - name: Verify Health After Deploy
        run: |
          sleep 20
          for endpoint in auth/health listing/health; do
            curl -sf https://rentmate.yourdomain.com/api/$endpoint || exit 1
          done
          echo "All production health checks passed!"
      - name: Tag Production Release
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}"
          git tag -a "$TAG" -m "Production release $TAG"
          git push origin "$TAG"
      - name: Notify Slack on Success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: '{"text": ":white_check_mark: *RentMate Production Deploy SUCCESS* | SHA: ${{ github.sha }} | By: ${{ github.actor }}", "channel": "#deployments"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: '{"text": ":x: *RentMate Production Deploy FAILED* | SHA: ${{ github.sha }} | Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "channel": "#deployments"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

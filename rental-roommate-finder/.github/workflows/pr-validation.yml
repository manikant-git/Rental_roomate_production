# ================================================================
# PR VALIDATION PIPELINE
# Triggers: When PR is raised to main or develop branch
# Purpose: Lint, Test, Build Docker image (validate only - no push)
# ================================================================
name: PR Validation

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'rental-roommate-finder/backend/**'
      - 'rental-roommate-finder/frontend/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-test:
    name: "Lint & Unit Test - ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - listing-service
          - roommate-service
          - api-gateway
          - frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rental-roommate-finder/backend/${{ matrix.service }}/package-lock.json

      - name: Install Dependencies
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            cd rental-roommate-finder/frontend && npm ci
          else
            cd rental-roommate-finder/backend/${{ matrix.service }} && npm ci
          fi

      - name: Run Linting
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            cd rental-roommate-finder/frontend && npm run lint
          else
            cd rental-roommate-finder/backend/${{ matrix.service }} && npm run lint
          fi

      - name: Run Unit Tests
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            cd rental-roommate-finder/frontend && npm test -- --coverage
          else
            cd rental-roommate-finder/backend/${{ matrix.service }} && npm test -- --coverage
          fi

  docker-build-validate:
    name: "Docker Build Validate (no push)"
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub (read-only token for PR)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Images (PR validation - no push)
        run: |
          DOCKER_USER="${{ secrets.DOCKERHUB_USERNAME }}"
          for svc in auth-service listing-service roommate-service api-gateway frontend; do
            CONTEXT="rental-roommate-finder/backend/$svc"
            if [ "$svc" == "frontend" ]; then CONTEXT="rental-roommate-finder/frontend"; fi
            IMAGE_TAG="$DOCKER_USER/rentmate-$svc:pr-${{ github.event.pull_request.number }}"
            docker build -t $IMAGE_TAG $CONTEXT
            echo "Built $IMAGE_TAG (not pushed - PR only)"
          done

      - name: Comment PR with Build Status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Docker build validation passed for PR #${{ github.event.pull_request.number }}. Images ready to merge.'
            })

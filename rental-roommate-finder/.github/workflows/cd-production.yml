name: CD - Production Deploy

on:
  push:
    branches: [main]
    paths:
      - 'rental-roommate-finder/backend/**'
      - 'rental-roommate-finder/frontend/**'
      - 'rental-roommate-finder/k8s/**'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Images
        run: |
          for svc in auth-service listing-service roommate-service notification-service api-gateway frontend; do
            CONTEXT="rental-roommate-finder/backend/$svc"
            if [ "$svc" == "frontend" ]; then CONTEXT="rental-roommate-finder/frontend"; fi
            
            docker build -t ghcr.io/${{ github.repository }}/$svc:latest $CONTEXT
            docker push ghcr.io/${{ github.repository }}/$svc:latest
          done

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name rental-prod-cluster --region us-east-1
          kubectl apply -f rental-roommate-finder/k8s/
          kubectl rollout status deployment/api-gateway -n rental-app --timeout=120s

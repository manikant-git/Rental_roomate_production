# ================================================================
# PODDISRUPTIONBUDGETS - Guarantee minimum availability during
# node upgrades, cluster scaling, or rolling deployments
# ================================================================

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service-pdb
  namespace: rental-app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: listing-service-pdb
  namespace: rental-app
spec:
  minAvailable: 2  # listing-service is high traffic - keep 2 alive
  selector:
    matchLabels:
      app: listing-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: rental-app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: roommate-service-pdb
  namespace: rental-app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: roommate-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: rental-app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
---
# ================================================================
# EXTERNAL SECRETS OPERATOR
# Sync secrets from AWS Secrets Manager to K8s Secrets
# Replaces plain K8s secrets with cloud-managed secrets
# ================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
# ServiceAccount with IRSA annotation (links to IAM role via OIDC)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: external-secrets
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/rental-prod-cluster-external-secrets-role
---
# ClusterSecretStore - tells ESO how to connect to AWS
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
# ExternalSecret - Sync all app credentials to rental-app namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: database-secret
  namespace: rental-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: /production/rentmate/database
        property: password
    - secretKey: POSTGRES_HOST
      remoteRef:
        key: /production/rentmate/database
        property: host
    - secretKey: JWT_SECRET
      remoteRef:
        key: /production/rentmate/jwt
        property: secret
    - secretKey: JWT_REFRESH_SECRET
      remoteRef:
        key: /production/rentmate/jwt
        property: refresh_secret
    - secretKey: SMTP_USER
      remoteRef:
        key: /production/rentmate/smtp
        property: username
    - secretKey: SMTP_PASS
      remoteRef:
        key: /production/rentmate/smtp
        property: password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: /production/rentmate/redis
        property: password
    - secretKey: RABBITMQ_PASSWORD
      remoteRef:
        key: /production/rentmate/rabbitmq
        property: password
